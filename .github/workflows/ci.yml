name: CI

on:
  push:
    branches:
      - main
      - prod

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  frontend:
    name: Frontend quality and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Type-check and build
        run: bun run build

      - name: Run unit tests
        run: bun run test:unit

      - name: Run integration tests
        run: bun run test:integration

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: bun run test:e2e

  node-services:
    name: ${{ matrix.name }} quality and tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: API Gateway
            path: app/backend/api-gateway
          - name: Auth Service
            path: app/backend/auth-service
          - name: Document Service
            path: app/backend/document-service
          - name: Collaboration Service
            path: app/backend/collab-service
    defaults:
      run:
        working-directory: ${{ matrix.path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Type-check and build
        run: bun run build

      - name: Run unit tests
        run: bun run test:unit

      - name: Run integration tests
        run: bun run test:integration

  ai-service:
    name: AI Service quality and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend/ai-service
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_ANON_KEY: fake-anon-key
      JWT_SECRET: test-jwt-secret
      OPENAI_API_KEY: test-openai-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: app/backend/ai-service/uv.lock

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Check formatting
        run: make format-check

      - name: Lint
        run: make lint

      - name: Type-check
        run: uv run mypy src

      - name: Run unit tests
        run: make test-unit

      - name: Run integration tests
        run: make test-integration

  production-compose:
    name: Production compose config
    runs-on: ubuntu-latest
    needs:
      - frontend
      - node-services
      - ai-service
    env:
      ALLOWED_ORIGINS: https://caret.page,https://www.caret.page
      DATABASE_URL: postgresql://postgres:postgres@db.example.test:5432/postgres
      JWT_SECRET: test-jwt-secret
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: fake-anon-key
      SUPABASE_SERVICE_ROLE_KEY: fake-service-role-key
      SUPABASE_JWT_SECRET: fake-supabase-jwt-secret
      VITE_API_BASE_URL: https://api.caret.page/api/v1
      VITE_API_URL: https://api.caret.page/api/v1
      VITE_COLLABORATION_WS_URL: wss://ws.caret.page/document
      VITE_COLLAB_WS_URL: wss://ws.caret.page/document
      VITE_ENABLE_COLLABORATION: "true"
      VITE_APP_ORIGIN: https://caret.page
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: fake-anon-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate production compose
        run: docker compose -f docker-compose.prod.yml config --quiet

  production-images:
    name: Build ${{ matrix.name }} image
    runs-on: ubuntu-latest
    needs:
      - frontend
      - node-services
      - ai-service
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            context: app/frontend
            dockerfile: app/frontend/Dockerfile.prod
            build-args: |
              VITE_API_BASE_URL=https://api.caret.page/api/v1
              VITE_API_URL=https://api.caret.page/api/v1
              VITE_COLLABORATION_WS_URL=wss://ws.caret.page/document
              VITE_COLLAB_WS_URL=wss://ws.caret.page/document
              VITE_ENABLE_COLLABORATION=true
              VITE_APP_ORIGIN=https://caret.page
              VITE_SUPABASE_URL=https://example.supabase.co
              VITE_SUPABASE_ANON_KEY=fake-anon-key
          - name: api-gateway
            context: app/backend/api-gateway
            dockerfile: app/backend/api-gateway/Dockerfile
            build-args: ""
          - name: auth-service
            context: app/backend/auth-service
            dockerfile: app/backend/auth-service/Dockerfile
            build-args: ""
          - name: document-service
            context: app/backend/document-service
            dockerfile: app/backend/document-service/Dockerfile
            build-args: ""
          - name: collab-service
            context: app/backend/collab-service
            dockerfile: app/backend/collab-service/Dockerfile
            build-args: ""
          - name: ai-service
            context: app/backend/ai-service
            dockerfile: app/backend/ai-service/Dockerfile
            build-args: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: caret/${{ matrix.name }}:${{ github.sha }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
