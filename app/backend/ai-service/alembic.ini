# Alembic configuration for the Caret AI Service.
# Generated/managed manually; do not rely on alembic init defaults.

[alembic]
# Path to the migrations directory, relative to this file.
script_location = app/db/migrations

# Template for naming generated migration files.
file_template = %%(rev)s_%%(slug)s

# Timezone for timestamps in migration file headers.
timezone = UTC

# Maximum length of the "slug" portion of the file name.
truncate_slug_length = 40

# If true, alembic --version will also show the full path.
version_path_separator = os

# Database URL is read from the environment; do not hard-code credentials here.
# Override via DATABASE_URL env var or -x option: alembic -x db=... upgrade head
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
