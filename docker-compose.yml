services:

  # ─────────────────────────────────────────────
  # Backend services
  # ─────────────────────────────────────────────

  api-gateway:
    build:
      context: ./app/backend/api-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      ALLOWED_ORIGINS: http://localhost:5173
      AUTH_SERVICE_URL: http://auth-service:3001
      DOCUMENT_SERVICE_URL: http://document-service:3002
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      - auth-service
      - document-service
      - ai-service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  auth-service:
    build:
      context: ./app/backend/auth-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  document-service:
    build:
      context: ./app/backend/document-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  collab-service:
    build:
      context: ./app/backend/collab-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  ai-service:
    build:
      context: ./app/backend/ai-service
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      PORT: 8000
      # Ensure the app package is importable when alembic (or any one-off
      # command) is run via `docker compose exec`.
      PYTHONPATH: /app
      DATABASE_URL: ${DATABASE_URL:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openrouter/healer-alpha}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────

  frontend:
    build:
      context: ./app/frontend
      args:
        VITE_SUPABASE_URL: ${SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
      VITE_COLLAB_WS_URL: ws://localhost:3003
      VITE_SUPABASE_URL: ${SUPABASE_URL:-}
      VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    depends_on:
      - api-gateway
